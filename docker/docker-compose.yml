name: yield-lag-bot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yield_lag}
      POSTGRES_USER: ${POSTGRES_USER:-yield_lag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yield_lag}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yield_lag} -d ${POSTGRES_DB:-yield_lag}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      YIELD_LAG_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-yield_lag}:${POSTGRES_PASSWORD:-yield_lag}@postgres:5432/${POSTGRES_DB:-yield_lag}
      YIELD_LAG_REDIS_URL: redis://redis:6379/0
      YIELD_LAG_LIVE_TRADING: "false"
      YIELD_LAG_PAPER_TRADING: "true"
    volumes:
      - bot-logs:/app/logs

volumes:
  postgres-data:
  redis-data:
  bot-logs:
