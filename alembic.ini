# Alembic config — DB URL is injected at runtime by migrations/env.py
# from the same Pydantic Settings used by the bot, so we keep this file minimal.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
timezone = UTC

# We do NOT set sqlalchemy.url here. env.py reads it from baccarat.core.config
# to guarantee a single source of truth (and to keep secrets out of source control).

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
